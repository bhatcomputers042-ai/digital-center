<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhat Computers - Professional Calendar</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="brand">
                <i class="fa-solid fa-laptop-code brand-icon"></i>
                <div class="brand-text">
                    <h1>Bhat Computers</h1>
                    <p>Technology & Software Solutions</p>
                </div>
            </div>
            <div class="contact-info">
                <a href="tel:7780980095" class="phone-link">
                    <i class="fa-solid fa-phone"></i> 7780980095
                </a>
            </div>
        </div>
    </header>

    <main class="dashboard-container">
        
        <section class="calendar-section">
            <div class="calendar-controls">
                <div class="nav-buttons">
                    <button id="prevBtn" title="Previous Month"><i class="fa-solid fa-chevron-left"></i></button>
                    <button id="todayBtn" class="btn-secondary">Today</button>
                    <button id="nextBtn" title="Next Month"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <h2 id="monthYearDisplay">Month Year</h2>
                <div class="utility-buttons">
                    <button id="themeToggle" title="Toggle Dark/Light Mode"><i class="fa-solid fa-moon"></i></button>
                    <button id="printBtn" title="Print Calendar" class="btn-secondary"><i class="fa-solid fa-print"></i> Print</button>
                </div>
            </div>

            <div class="calendar-grid-container">
                <div class="weekdays-grid">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="calendarDays" class="days-grid">
                    </div>
            </div>
        </section>

        <aside class="side-panel">
            <div class="panel-section">
                <h3><i class="fa-solid fa-calendar-day"></i> Selected Day Info</h3>
                <div id="dayDetails" class="day-details">
                    <p class="gregorian-date">Select a day</p>
                    <p class="hijri-date">-</p>
                    <p class="holiday-text">-</p>
                </div>
            </div>
            
            <div class="panel-section">
                <h3><i class="fa-solid fa-pen-to-square"></i> Notes & Events</h3>
                <textarea id="notesArea" placeholder="Click any date to add or view custom notes for that day..."></textarea>
                <button id="saveNotesBtn" class="btn-primary">Save Notes</button>
            </div>
        </aside>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <p>&copy; 2026 Bhat Computers. All Rights Reserved.</p>
            <p>Reliable IT Support & Web Solutions | Phone: 7780980095</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
